<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - VideoSee</title>
  <link rel="stylesheet" href="styl.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
  <div class="wrapper">
    <form action="">
      <h1>Войти</h1>
      <div class="input-box">
        <input type="text" placeholder="Имя/никнейм" required>
        <i class='bx bxs-user'></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Ваш пароль" required>
        <i class='bx bxs-lock-alt' ></i>
      </div>
      <div class="remember-forgot">
        <label><input type="checkbox">Запомнить устройство</label>
        <a href="#">Забыл пароль?</a>
      </div>
      <button type="submit" class="btn"><a href="index.html">Войти</a></button>
      <div class="register-link">
        <p>В первый раз в VideoSee? <a href="#">Тогда создай аккаунт!</a></p>
      </div>
    </form>
  </div>
</body>
</html>
